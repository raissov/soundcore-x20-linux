<!doctype html>
<meta charset="utf-8">
<title>Headphone Settings</title>
<style>
  :root {
    --bg: #131317;
    --card: #1b1b21;
    --line: rgba(255,255,255,.09);
    --fg: #f2f2f4;
    --dim: rgba(242,242,244,.55);
    --dimmer: rgba(242,242,244,.34);
    --accent: #7fd7ff;
    --ok: #6ee7a8;
    --warn: #ffd166;
    --bad: #ff6b6b;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: "Golos Text", "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 13px;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* ---------- шапка ---------- */
  header {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    position: sticky; top: 0; background: var(--bg); z-index: 5;
  }
  #gl { width: 92px; height: 92px; flex: none; }
  .htext { flex: 1; min-width: 0; }
  .hname { font-size: 16px; font-weight: 600; }
  .hsub { color: var(--dim); font-size: 12px; margin-top: 3px; }
  .hsub b { color: var(--accent); font-weight: 600; }

  button.ghost {
    background: transparent; color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    padding: 7px 13px; font: inherit; font-size: 12px; cursor: pointer;
  }
  button.ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  button.ghost:disabled { opacity: .45; cursor: default; }

  /* ---------- батарея ---------- */
  #batt { display: flex; gap: 10px; padding: 14px 20px 4px; }
  .bcell {
    flex: 1; background: var(--card); border: 1px solid var(--line);
    border-radius: 12px; padding: 10px 12px;
  }
  .bcell .lbl { color: var(--dim); font-size: 11px; }
  .bcell .val { font-size: 19px; font-weight: 600; margin: 3px 0 7px; font-variant-numeric: tabular-nums; }
  .bcell .chg { color: var(--ok); font-size: 10.5px; }
  .track { height: 5px; border-radius: 3px; background: rgba(255,255,255,.10); overflow: hidden; }
  .track > i { display: block; height: 100%; width: 0; border-radius: 3px; background: var(--ok);
               transition: width .5s ease, background .3s ease; }

  /* ---------- секции ---------- */
  section { padding: 16px 20px 4px; }
  h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: .09em;
    color: var(--dimmer); margin: 0 0 10px; font-weight: 600;
  }
  .group { background: var(--card); border: 1px solid var(--line); border-radius: 14px; }

  .item {
    display: flex; align-items: center; gap: 14px;
    padding: 11px 14px; border-bottom: 1px solid var(--line);
    min-height: 48px;
  }
  .item:last-child { border-bottom: 0; }
  .item .name { flex: 1; min-width: 0; }
  .item .name small { display: block; color: var(--dimmer); font-size: 11px; margin-top: 2px; }
  .item.busy { opacity: .5; pointer-events: none; }
  .item.ro .ctl { color: var(--dim); }

  /* сегментированный переключатель */
  .seg { display: flex; gap: 4px; background: rgba(255,255,255,.05); padding: 3px; border-radius: 10px; }
  .seg button {
    background: transparent; border: 0; color: var(--dim);
    padding: 6px 12px; border-radius: 8px; font: inherit; font-size: 12px; cursor: pointer;
    white-space: nowrap;
  }
  .seg button:hover { color: var(--fg); }
  .seg button[aria-pressed="true"] { background: var(--accent); color: #0d1b22; font-weight: 600; }

  /* WebKit рисует select нативно и игнорирует цвета — получался белый
     прямоугольник со светлым текстом на светлом фоне. Отключаем нативный вид. */
  select {
    -webkit-appearance: none;
    appearance: none;
    background-color: #24242c;
    background-image: linear-gradient(45deg, transparent 50%, var(--dim) 50%),
                      linear-gradient(135deg, var(--dim) 50%, transparent 50%);
    background-position: calc(100% - 15px) 50%, calc(100% - 10px) 50%;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    color: var(--fg);
    border: 1px solid var(--line); border-radius: 9px;
    padding: 7px 30px 7px 11px;
    font: inherit; font-size: 12px; max-width: 260px; cursor: pointer;
  }
  select:hover { border-color: var(--accent); }
  select option { background-color: #1b1b21; color: var(--fg); }

  /* тумблер */
  .sw { width: 44px; height: 25px; border-radius: 13px; background: rgba(255,255,255,.14);
        border: 0; position: relative; cursor: pointer; transition: background .2s ease; flex: none; }
  .sw::after { content: ""; position: absolute; top: 3px; left: 3px; width: 19px; height: 19px;
               border-radius: 50%; background: #fff; transition: transform .2s ease; }
  .sw[aria-pressed="true"] { background: var(--accent); }
  .sw[aria-pressed="true"]::after { transform: translateX(19px); }

  .info { color: var(--dim); font-variant-numeric: tabular-nums; text-align: right; }

  /* эквалайзер только для чтения */
  .eq { display: flex; gap: 8px; align-items: flex-end; padding: 12px 14px; height: 96px; }
  .eq .band { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; height: 100%; }
  .eq .bar { flex: 1; width: 100%; background: rgba(255,255,255,.07); border-radius: 4px;
             display: flex; align-items: flex-end; overflow: hidden; }
  .eq .bar > i { display: block; width: 100%; background: linear-gradient(180deg, var(--accent), #3b7f9c); }
  .eq .hz { color: var(--dimmer); font-size: 9.5px; }

  .note {
    color: var(--dimmer); font-size: 11.5px; line-height: 1.5;
    padding: 10px 14px; border-top: 1px solid var(--line);
  }

  /* ---------- тост ---------- */
  #toast {
    position: fixed; left: 50%; bottom: 18px; transform: translate(-50%, 20px);
    background: #2a1f22; color: #ffd3d3; border: 1px solid rgba(255,107,107,.4);
    padding: 9px 15px; border-radius: 10px; font-size: 12px;
    opacity: 0; pointer-events: none; transition: opacity .2s ease, transform .2s ease;
    max-width: 80%;
  }
  #toast.show { opacity: 1; transform: translate(-50%, 0); }

  #loading { padding: 40px 20px; text-align: center; color: var(--dim); }
</style>

<header>
  <canvas id="gl"></canvas>
  <div class="htext">
    <div class="hname">soundcore Sport X20</div>
    <div class="hsub" id="hsub">…</div>
  </div>
  <button class="ghost" id="refresh">Refresh</button>
</header>

<div id="batt"></div>
<div id="body"><div id="loading">…</div></div>
<div id="toast"></div>

<script type="module" src="./settings.js"></script>
